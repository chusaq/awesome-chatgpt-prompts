<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Daily Habits</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #f2f2f7;
      --card: #ffffff;
      --text-primary: #1c1c1e;
      --text-secondary: #8e8e93;
      --text-tertiary: #aeaeb2;
      --separator: #e5e5ea;
      --accent-meditation: #5856d6;
      --accent-sport: #ff6b35;
      --accent-cold: #32ade6;
      --success: #34c759;
      --radius: 20px;
      --radius-sm: 14px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }

    .app {
      max-width: 390px;
      margin: 0 auto;
      padding: 0 20px 40px;
    }

    /* Header */
    .header {
      padding: 60px 0 32px;
    }

    .greeting {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.3px;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .date-heading {
      font-size: 34px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.5px;
      line-height: 1.1;
    }

    /* Progress ring section */
    .progress-section {
      display: flex;
      align-items: center;
      gap: 20px;
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .ring-container {
      position: relative;
      width: 80px;
      height: 80px;
      flex-shrink: 0;
    }

    .ring-svg {
      transform: rotate(-90deg);
      width: 80px;
      height: 80px;
    }

    .ring-bg {
      fill: none;
      stroke: var(--separator);
      stroke-width: 6;
    }

    .ring-fill {
      fill: none;
      stroke: var(--success);
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 213;
      stroke-dashoffset: 213;
      transition: stroke-dashoffset 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .ring-count {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 22px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .progress-text {
      flex: 1;
    }

    .progress-label {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .progress-sublabel {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    .streak-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #fff9e6;
      border: 1px solid #ffd60a22;
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 13px;
      font-weight: 600;
      color: #c4920a;
      margin-top: 8px;
    }

    /* Section label */
    .section-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 0 4px;
      margin-bottom: 10px;
      margin-top: 24px;
    }

    /* Habit cards */
    .habits-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .habit-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      position: relative;
      overflow: hidden;
    }

    .habit-card:active {
      transform: scale(0.97);
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }

    .habit-card.completed {
      background: var(--card);
    }

    .habit-card.completed::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.04;
      border-radius: var(--radius);
    }

    .habit-card[data-id="meditation"].completed::before { background: var(--accent-meditation); }
    .habit-card[data-id="sport"].completed::before { background: var(--accent-sport); }
    .habit-card[data-id="cold"].completed::before { background: var(--accent-cold); }

    .habit-icon-wrap {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      flex-shrink: 0;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .habit-card.completed .habit-icon-wrap {
      transform: scale(1.05);
    }

    .habit-card[data-id="meditation"] .habit-icon-wrap { background: #f0efff; }
    .habit-card[data-id="sport"] .habit-icon-wrap { background: #fff2ee; }
    .habit-card[data-id="cold"] .habit-icon-wrap { background: #edf8ff; }

    .habit-info {
      flex: 1;
    }

    .habit-name {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 3px;
    }

    .habit-desc {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .habit-card.completed .habit-name {
      color: var(--text-primary);
    }

    .check-wrap {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 2px solid var(--separator);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .habit-card.completed .check-wrap {
      background: var(--success);
      border-color: var(--success);
    }

    .check-icon {
      width: 16px;
      height: 16px;
      opacity: 0;
      transform: scale(0.5);
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .habit-card.completed .check-icon {
      opacity: 1;
      transform: scale(1);
    }

    /* Time completed label */
    .completed-time {
      font-size: 11px;
      color: var(--success);
      font-weight: 500;
      margin-top: 2px;
      height: 14px;
      overflow: hidden;
      transition: opacity 0.2s ease;
      opacity: 0;
    }

    .habit-card.completed .completed-time {
      opacity: 1;
    }

    /* History section */
    .history-section {
      margin-top: 32px;
    }

    .week-grid {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .week-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-bottom: 6px;
    }

    .week-day-label {
      text-align: center;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 0 0 8px;
    }

    .week-dot {
      aspect-ratio: 1;
      border-radius: 8px;
      background: var(--separator);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: transparent;
      transition: background 0.3s ease;
    }

    .week-dot.partial { background: #c7f2d1; color: transparent; }
    .week-dot.full { background: var(--success); }
    .week-dot.today { outline: 2px solid var(--text-secondary); outline-offset: 2px; }

    /* Reset button */
    .reset-btn {
      display: block;
      width: 100%;
      margin-top: 32px;
      padding: 14px;
      background: var(--card);
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 500;
      color: #ff3b30;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .reset-btn:active {
      opacity: 0.6;
      transform: scale(0.98);
    }

    /* Completion celebration */
    .celebration {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .celebration.show {
      opacity: 1;
      pointer-events: all;
    }

    .celebration-card {
      background: white;
      border-radius: 28px;
      padding: 40px 36px;
      text-align: center;
      max-width: 320px;
      width: 90%;
      transform: scale(0.85);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .celebration.show .celebration-card {
      transform: scale(1);
    }

    .celebration-emoji {
      font-size: 64px;
      margin-bottom: 16px;
      display: block;
    }

    .celebration-title {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    .celebration-sub {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 28px;
      line-height: 1.4;
    }

    .celebration-dismiss {
      background: var(--text-primary);
      color: white;
      border: none;
      border-radius: 14px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      width: 100%;
      transition: opacity 0.15s;
    }

    .celebration-dismiss:active { opacity: 0.7; }

    /* Tap ripple */
    @keyframes ripple {
      from { transform: scale(0); opacity: 0.4; }
      to { transform: scale(4); opacity: 0; }
    }

    .ripple {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(52, 199, 89, 0.3);
      pointer-events: none;
      animation: ripple 0.6s ease-out forwards;
    }
  </style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="greeting" id="greeting">Good morning</div>
    <div class="date-heading" id="dateHeading">Today</div>
  </header>

  <!-- Progress -->
  <div class="progress-section">
    <div class="ring-container">
      <svg class="ring-svg" viewBox="0 0 80 80">
        <circle class="ring-bg" cx="40" cy="40" r="34" />
        <circle class="ring-fill" id="ringFill" cx="40" cy="40" r="34" />
      </svg>
      <span class="ring-count" id="ringCount">0/3</span>
    </div>
    <div class="progress-text">
      <div class="progress-label" id="progressLabel">Ready to go</div>
      <div class="progress-sublabel" id="progressSub">Complete your habits today</div>
      <div class="streak-badge" id="streakBadge">🔥 <span id="streakNum">0</span> day streak</div>
    </div>
  </div>

  <div class="section-label">Today's Habits</div>

  <!-- Habits -->
  <div class="habits-list">
    <div class="habit-card" data-id="meditation" onclick="toggleHabit('meditation', event)">
      <div class="habit-icon-wrap">🧘</div>
      <div class="habit-info">
        <div class="habit-name">Meditation</div>
        <div class="habit-desc">Find your stillness</div>
        <div class="completed-time" id="time-meditation"></div>
      </div>
      <div class="check-wrap">
        <svg class="check-icon" viewBox="0 0 16 16" fill="none">
          <path d="M3 8.5L6.5 12L13 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <div class="habit-card" data-id="sport" onclick="toggleHabit('sport', event)">
      <div class="habit-icon-wrap">🏃</div>
      <div class="habit-info">
        <div class="habit-name">Sport</div>
        <div class="habit-desc">Push your limits</div>
        <div class="completed-time" id="time-sport"></div>
      </div>
      <div class="check-wrap">
        <svg class="check-icon" viewBox="0 0 16 16" fill="none">
          <path d="M3 8.5L6.5 12L13 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <div class="habit-card" data-id="cold" onclick="toggleHabit('cold', event)">
      <div class="habit-icon-wrap">🧊</div>
      <div class="habit-info">
        <div class="habit-name">Cold Plunge</div>
        <div class="habit-desc">Embrace the cold</div>
        <div class="completed-time" id="time-cold"></div>
      </div>
      <div class="check-wrap">
        <svg class="check-icon" viewBox="0 0 16 16" fill="none">
          <path d="M3 8.5L6.5 12L13 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>
  </div>

  <!-- Weekly history -->
  <div class="history-section">
    <div class="section-label">This Week</div>
    <div class="week-grid">
      <div class="week-row" id="weekLabels"></div>
      <div class="week-row" id="weekDots"></div>
    </div>
  </div>

  <button class="reset-btn" onclick="resetDay()">Reset Today</button>
</div>

<!-- Celebration overlay -->
<div class="celebration" id="celebration" onclick="dismissCelebration()">
  <div class="celebration-card" onclick="event.stopPropagation()">
    <span class="celebration-emoji">🎉</span>
    <div class="celebration-title">All Done!</div>
    <div class="celebration-sub">You crushed all three habits today. Keep the streak alive!</div>
    <button class="celebration-dismiss" onclick="dismissCelebration()">Awesome!</button>
  </div>
</div>

<script>
  const HABITS = ['meditation', 'sport', 'cold'];
  const STORAGE_KEY = 'daily_habits_v2';

  function getTodayKey() {
    return new Date().toISOString().split('T')[0];
  }

  function loadData() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    } catch { return {}; }
  }

  function saveData(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function getTodayData(data) {
    const key = getTodayKey();
    if (!data[key]) data[key] = { habits: {}, celebrationShown: false };
    return data[key];
  }

  function toggleHabit(id, event) {
    const data = loadData();
    const today = getTodayData(data);

    if (today.habits[id]) {
      delete today.habits[id];
    } else {
      const now = new Date();
      today.habits[id] = now.toTimeString().slice(0, 5);
      addRipple(event);
    }

    saveData(data);
    render(data);

    const completed = Object.keys(today.habits).length;
    if (completed === 3 && !today.celebrationShown) {
      today.celebrationShown = true;
      saveData(data);
      setTimeout(() => showCelebration(), 400);
    }
  }

  function addRipple(event) {
    const card = event.currentTarget;
    const rect = card.getBoundingClientRect();
    const x = event.clientX - rect.left - 20;
    const y = event.clientY - rect.top - 20;
    const ripple = document.createElement('div');
    ripple.className = 'ripple';
    ripple.style.left = x + 'px';
    ripple.style.top = y + 'px';
    card.appendChild(ripple);
    ripple.addEventListener('animationend', () => ripple.remove());
  }

  function showCelebration() {
    document.getElementById('celebration').classList.add('show');
  }

  function dismissCelebration() {
    document.getElementById('celebration').classList.remove('show');
  }

  function resetDay() {
    const data = loadData();
    const key = getTodayKey();
    data[key] = { habits: {}, celebrationShown: false };
    saveData(data);
    render(data);
  }

  function getStreak(data) {
    let streak = 0;
    const today = new Date();
    for (let i = 0; i < 365; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const key = d.toISOString().split('T')[0];
      const dayData = data[key];
      if (dayData && Object.keys(dayData.habits || {}).length === 3) {
        streak++;
      } else if (i === 0) {
        // Today not done yet — don't break streak
        continue;
      } else {
        break;
      }
    }
    return streak;
  }

  function render(data) {
    const today = getTodayData(data);
    const completedCount = Object.keys(today.habits).length;

    // Update header
    const now = new Date();
    const hour = now.getHours();
    const greetings = hour < 12 ? 'Good morning' : hour < 17 ? 'Good afternoon' : 'Good evening';
    document.getElementById('greeting').textContent = greetings;
    document.getElementById('dateHeading').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

    // Update ring
    const circumference = 213;
    const offset = circumference - (completedCount / 3) * circumference;
    document.getElementById('ringFill').style.strokeDashoffset = offset;
    document.getElementById('ringCount').textContent = completedCount + '/3';

    // Progress text
    const labels = ['Ready to go', 'Keep going!', 'Almost there!', 'All done!'];
    const subs = [
      'Complete your habits today',
      'One down, two to go',
      'One more to complete the day',
      'You nailed it today'
    ];
    document.getElementById('progressLabel').textContent = labels[completedCount];
    document.getElementById('progressSub').textContent = subs[completedCount];

    // Streak
    const streak = getStreak(data);
    document.getElementById('streakNum').textContent = streak;

    // Habit cards
    HABITS.forEach(id => {
      const card = document.querySelector(`.habit-card[data-id="${id}"]`);
      const timeEl = document.getElementById('time-' + id);
      if (today.habits[id]) {
        card.classList.add('completed');
        timeEl.textContent = 'Done at ' + today.habits[id];
      } else {
        card.classList.remove('completed');
        timeEl.textContent = '';
      }
    });

    // Week grid
    renderWeek(data);
  }

  function renderWeek(data) {
    const days = ['Su', 'Mo', 'Tu', 'We', 'Th', 'Fr', 'Sa'];
    const today = new Date();
    const todayKey = getTodayKey();

    const labelsRow = document.getElementById('weekLabels');
    const dotsRow = document.getElementById('weekDots');
    labelsRow.innerHTML = '';
    dotsRow.innerHTML = '';

    for (let i = 6; i >= 0; i--) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const key = d.toISOString().split('T')[0];
      const dayData = data[key];
      const count = dayData ? Object.keys(dayData.habits || {}).length : 0;

      const label = document.createElement('div');
      label.className = 'week-day-label';
      label.textContent = days[d.getDay()];
      labelsRow.appendChild(label);

      const dot = document.createElement('div');
      dot.className = 'week-dot';
      if (count === 3) dot.classList.add('full');
      else if (count > 0) dot.classList.add('partial');
      if (key === todayKey) dot.classList.add('today');
      dotsRow.appendChild(dot);
    }
  }

  // Init
  const data = loadData();
  render(data);
</script>
</body>
</html>
